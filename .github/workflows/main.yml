# .github/workflows/release.yml
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # 👇 Clave — todo corre desde Frontend/
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create .env file
        working-directory: frontend
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build & Package
        working-directory: frontend
        run: npm run dist:win
        env:
          # evita que electron-builder intente publicar solo
          EP_DRAFT: true
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload to public releases repo
        uses: softprops/action-gh-release@v2
        with:
          name: windows-installer
          files: |
            frontend/release/*.exe
            frontend/release/latest.yml
          repository: mmateovelezt/Silo
          token: ${{ secrets.RELEASE_TOKEN }} # token del repo público
          tag_name: ${{ github.ref_name }}

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create .env file
        working-directory: frontend
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Build & Package
        working-directory: frontend
        run: npm run dist:mac
        env:
          EP_DRAFT: true
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: softprops/action-gh-release@v2
        with:
          name: mac-installer
          files: |
            frontend/release/*.dmg
            frontend/release/latest-mac.yml
          repository: mmateovelezt/Silo
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ github.ref_name }}
